name: Build Linux CLI

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  linux-cpu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.22' }
      - name: Deps
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake git
      - name: Build whisper.cpp (CPU, shared)
        run: |
          git clone --depth 1 https://github.com/ggerganov/whisper.cpp
          cmake -S whisper.cpp -B whisper.cpp/build -DCMAKE_BUILD_TYPE=Release \
                -DBUILD_SHARED_LIBS=ON -DWHISPER_BUILD_EXAMPLES=OFF -DWHISPER_BUILD_TESTS=OFF
          cmake --build whisper.cpp/build -j
      - name: Stage libs/headers
        run: |
          mkdir -p app/lib app/inc/ggml
          find whisper.cpp/build -name '*.so*' -exec cp -a {} app/lib/ \;
          cp whisper.cpp/include/whisper.h app/inc/
          cp whisper.cpp/ggml/include/*.h app/inc/ggml/
      - name: Build CLI (CPU)
        run: cd app && CGO_ENABLED=1 go build -trimpath -ldflags="-s -w" -o whisperhybrid .
      - name: Package
        run: |
          mkdir -p dist && cp app/whisperhybrid dist/ && cp -a app/lib/*.so* dist/
          cp README.md dist/ 2>/dev/null || true
          printf 'Linux CPU build. Download ggml-large-v3-turbo-q3_k.bin from the Release.\nRun: LD_LIBRARY_PATH=. ./whisperhybrid -model ggml-large-v3-turbo-q3_k.bin -lang en clip.wav\n' > dist/README-LINUX.txt
      - uses: actions/upload-artifact@v4
        with: { name: orbination-whisper-linux-amd64-cpu, path: dist }
      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          tar -C dist -czf orbination-whisper-linux-amd64-cpu.tar.gz .
          gh release upload ${{ github.ref_name }} orbination-whisper-linux-amd64-cpu.tar.gz --clobber
        env: { GH_TOKEN: '${{ secrets.GITHUB_TOKEN }}' }

